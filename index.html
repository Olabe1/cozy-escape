<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cozy Escape</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="rain"></div>
  <div class="overlay"></div>

  <main class="app">

    <section class="hero">
      <p class="eyebrow" id="title-small">A soft little escape</p>
      
      <p id="quote">Welcome to your cozy escape 🌿</p>

      <h1 id="main-title">How are you feeling today?</h1>

      <p class="intro" id="intro-text">
        Choose your mood and enter a calm world made for your moment.
      </p>

      <div id="scene"></div>

      <div class="mood-buttons">
        <button id="peaceful-btn">Peaceful</button>
        <button id="tired-btn">Tired</button>
        <button id="stressed-btn">Stressed</button>
        <button id="dreamy-btn">Dreamy</button>
        <button id="hungry-btn">Hungry</button>
      </div>

      <button id="back-btn" class="back-btn">← Back</button>
      <button id="sound-btn" class="sound-btn">🔊 Sound On</button>
    </section>
    
  </main>

  <audio id="audio-player" loop></audio>
  <script src="script.js"></script>
</body>
</html>
